name: "Jamundí Data Extraction"

on:
  schedule:
    # Run every Monday at 8:00 AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Allow manual triggers
    inputs:
      full:
        description: 'Run full extraction'
        required: True
        default: 'true'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OBS_USER: ${{ secrets.OBS_USER }}
      OBS_PASSWORD: ${{ secrets.OBS_PASSWORD }}
      OBS_HEADLESS: "True"
      LOG_LEVEL: "INFO"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Extraction Pipeline
        run: |
          python -m src.pipelines.run_full_extract --full

      - name: Generate PDF Report
        run: |
          python -m src.reporting.generate_pdf_report

      - name: Check for Data Updates
        run: |
          python -m src.reporting.check_changes

      - name: Send Email Report
        if: env.DATA_CHANGED == 'true' || github.event_name == 'schedule'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          python -m src.reporting.send_email

      - name: Commit New Data Hash
        if: env.DATA_CHANGED == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/data_hash.txt
          git commit -m "Actualizando hash de datos detectados [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload Extracted Data
        uses: actions/upload-artifact@v4
        with:
          name: jamundi-extracted-data
          path: data/final/
          retention-days: 7

      - name: Upload Logs and Errors
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extraction-logs
          path: |
            logs/
            data/raw/
          retention-days: 3
